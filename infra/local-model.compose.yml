services:
  local-task-model:
    image: ghcr.io/ggml-org/llama.cpp@sha256:ae4883b4bf0814bfe44cb8b4cdc5208412f61599200fb8482a96935cdacc184e
    container_name: track-the-hack-local-task-model
    restart: unless-stopped
    init: true
    ports:
      - "10.0.0.4:8090:8080"
    command:
      - "--model"
      - "/models/Qwen3-4B-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--ctx-size"
      - "8192"
      - "--threads"
      - "2"
      - "--parallel"
      - "1"
      - "--reasoning"
      - "off"
      - "--metrics"
      - "--sleep-idle-seconds"
      - "300"
      - "--api-key-file"
      - "/run/secrets/local_model_api_key"
    volumes:
      - ${LOCAL_MODEL_DIR:?Set LOCAL_MODEL_DIR to the verified model directory}:/models:ro
    secrets:
      - local_model_api_key
    mem_limit: 4g
    cpus: 1.5
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

secrets:
  local_model_api_key:
    file: ${LOCAL_MODEL_API_KEY_FILE:?Set LOCAL_MODEL_API_KEY_FILE to a root-readable secret file}
