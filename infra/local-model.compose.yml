services:
  local-task-model:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: track-the-hack-local-task-model
    restart: unless-stopped
    init: true
    ports:
      - "8090:8080"
    command:
      - "-hf"
      - "Qwen/Qwen3-4B-GGUF:Q4_K_M"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--ctx-size"
      - "8192"
      - "--threads"
      - "2"
      - "--parallel"
      - "1"
      - "--reasoning"
      - "off"
      - "--metrics"
    environment:
      HOME: /models
      HF_HOME: /models/huggingface
    volumes:
      - local_model_cache:/models
    mem_limit: 4g
    cpus: 1.5
    pids_limit: 256
    security_opt:
      - no-new-privileges:true

volumes:
  local_model_cache:
